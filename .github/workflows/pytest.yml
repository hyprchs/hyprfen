name: pytest

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.1.0
        with:
          enable-cache: true

      - name: Cache Lichess test data
        uses: actions/cache@v4
        with:
          path: .cache
          key: lichess-cache-${{ runner.os }}-2013-01-${{ hashFiles('src/hyprfen/lichess_sample.py') }}
          restore-keys: |
            lichess-cache-${{ runner.os }}-2013-01-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q
